name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Needed by PyQt6 at *import* time (libEGL.so.1, libxcb-*).
      # The lint matrix is ubuntu-only, so no `runner.os` guard.
      - name: Install Linux Qt system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxcb-cursor0 libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src/

      - name: Ruff (format check)
        run: ruff format --check src/

      - name: Pylint
        run: pylint src/

      - name: Bandit
        run: bandit -r src/ -ll -q

      # Real runtime smoke import. Lint/format/pylint/bandit are all
      # AST-based; they don't actually import the modules and so will
      # NOT catch a broken relative import like `from .app.constants`
      # that resolves to a nonexistent path. Importing src.main forces
      # Python to walk every transitive import; if any one of them is
      # broken the job fails.
      #
      # QT_QPA_PLATFORM=offscreen so PyQt6 module imports don't try to
      # connect to an X server on the headless runner. We never
      # instantiate QApplication here, so the platform plugin should
      # not even load — but the env var is cheap insurance.
      - name: Smoke import
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -c "import src.main"

      - name: Pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

  build:
    name: Build (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Linux Qt system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxcb-cursor0 libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: pyinstaller HostingerVPSManager.spec --clean --noconfirm

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: hostinger-vps-manager-${{ matrix.os }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
