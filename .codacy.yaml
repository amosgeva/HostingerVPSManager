# Codacy Configuration
# https://docs.codacy.com/repositories-configure/codacy-configuration-file/

# Exclude paths from analysis
exclude_paths:
  # Tests and dev tooling - linted separately or not at all
  - "tests/**"
  - "test-reports/**"
  - "test-results/**"

  # Docs and ancillary content
  - "docs/**"
  - "examples/**"
  - "scripts/**"

  # Build artefacts
  - "build/**"
  - "dist/**"
  - "assets/**"
  - "**/__pycache__/**"
  - "**/*.pyc"
