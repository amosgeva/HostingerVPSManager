# Codacy Configuration
# https://docs.codacy.com/repositories-configure/codacy-configuration-file/

# Exclude paths from analysis
exclude_paths:
  # Development/admin scripts - don't run in production, no user input
  - "scripts/**"
  - "examples/**"
  - "docs/**"
  - "sql/**"
  - "Synk/**"
  - "supabase/**"
  - "test-reports/**"
  - "test-results/**"
  - "tests/**"
  
  # Admin-only email preview utilities - sanitized, no external user access
  - "src/utils/test-deadline-emails.ts"
  
  # SEO structured data - safe pattern using JSON.stringify on static data
  - "src/components/seo/structured-data.tsx"
